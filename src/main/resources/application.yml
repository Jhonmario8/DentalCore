server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${LC_DB_URL}
    username: ${LC_DB_USERNAME}
    password: ${LC_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    jwt:
      secret: ${PRAGMA_JWT_KEY}
      expiration: 3600000
  cors:
    allowed-origins:
      - http://localhost:5500
      - http://127.0.0.1:5500
